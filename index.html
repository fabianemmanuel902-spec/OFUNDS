<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OFUNDS - Earn Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { 
      font-family: 'Inter', sans-serif; 
      font-size: 0.9rem;
    }
    .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); }
    .balance-text { 
      font-size: 2.25rem;
      font-weight: 900; 
      letter-spacing: -1px; 
    }
    .neon-glow { text-shadow: 0 0 20px rgb(234 179 8); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen gradient-bg">

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
      <div class="flex justify-center mb-8">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-yellow-400 rounded-2xl flex items-center justify-center">
            <i class="fa-solid fa-coins text-zinc-900 text-2xl"></i>
          </div>
          <div>
            <h1 class="text-3xl font-black tracking-tighter">OFUNDS</h1>
            <p class="text-yellow-400 text-xs -mt-1">EARN LIVE</p>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="bg-zinc-900 rounded-3xl p-1 flex mb-6">
        <button onclick="switchTab(0)" id="login-tab"
          class="flex-1 py-3 rounded-3xl font-semibold bg-zinc-800 text-white text-sm">Login</button>
        <button onclick="switchTab(1)" id="signup-tab"
          class="flex-1 py-3 rounded-3xl font-semibold text-sm">Sign Up</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="login-form">
        <div class="space-y-4">
          <input type="email" id="login-email" placeholder="Email address" 
            class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400 text-sm">
          <div class="relative">
            <input type="password" id="login-password" placeholder="Password" 
              class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400 text-sm">
            <button onclick="togglePassword('login-password')" class="absolute right-5 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-white">
              <i class="fa-solid fa-eye" id="login-eye"></i>
            </button>
          </div>
          <button onclick="handleLogin()" 
            class="w-full bg-yellow-400 hover:bg-yellow-300 text-zinc-900 font-bold py-4 rounded-2xl text-base active:scale-95 transition">
            LOGIN
          </button>
          <p id="login-message" class="text-center text-red-400 text-xs min-h-[20px]"></p>
        </div>
      </div>

      <!-- SIGNUP FORM -->
      <div id="signup-form" class="hidden">
        <div class="space-y-4">
          <input type="text" id="signup-firstname" placeholder="First name" 
            class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400 text-sm">
          <input type="email" id="signup-email" placeholder="Email address" 
            class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400 text-sm">
          <div class="relative">
            <input type="password" id="signup-password" placeholder="Create password" 
              class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400 text-sm">
            <button onclick="togglePassword('signup-password')" class="absolute right-5 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-white">
              <i class="fa-solid fa-eye" id="signup-eye"></i>
            </button>
          </div>
          <button onclick="handleSignup()" 
            class="w-full bg-yellow-400 hover:bg-yellow-300 text-zinc-900 font-bold py-4 rounded-2xl text-base active:scale-95 transition">
            CREATE ACCOUNT
          </button>
          <p id="signup-message" class="text-center text-red-400 text-xs min-h-[20px]"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden min-h-screen pb-12">
    <nav class="bg-zinc-900 px-5 py-4 flex justify-between items-center border-b border-zinc-800">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-yellow-400 rounded-2xl flex items-center justify-center">
          <i class="fa-solid fa-coins text-zinc-900 text-xl"></i>
        </div>
        <h1 class="font-black text-xl tracking-tighter">OFUNDS</h1>
      </div>
      <button onclick="logout()" class="text-zinc-400 hover:text-red-400">
        <i class="fa-solid fa-right-from-bracket"></i>
      </button>
    </nav>

    <div class="p-5 max-w-5xl mx-auto">
      <h2 id="welcome-name" class="text-2xl font-bold">Welcome back</h2>
      <p class="text-zinc-400 text-sm">Earn ₦500/sec • Max ₦85,000</p>

      <!-- Balance Card -->
      <div class="mt-6 bg-gradient-to-br from-zinc-900 to-zinc-800 border border-yellow-400/30 rounded-3xl p-6">
        <div class="flex justify-between items-start">
          <div>
            <p class="uppercase text-xs tracking-widest text-zinc-400">TOTAL BALANCE</p>
            <div class="flex items-baseline mt-2">
              <span class="text-3xl font-black text-yellow-400">₦</span>
              <span id="balance" class="balance-text neon-glow ml-1">0</span>
            </div>
            <p id="balance-limit" class="text-emerald-400 text-xs mt-1">₦85,000 limit</p>
          </div>
          <button onclick="toggleBalanceVisibility()" class="mt-1">
            <i class="fa-solid fa-eye text-xl text-zinc-400" id="eye-icon"></i>
          </button>
        </div>

        <div id="cashout-warning" class="hidden mt-4 bg-amber-500/10 border border-amber-500 text-amber-400 text-xs p-3 rounded-2xl">
          ⚠️ Approaching limit — Cash out now!
        </div>

        <div class="grid grid-cols-2 gap-3 mt-6">
          <button onclick="toggleEarning()" id="earn-btn"
            class="bg-emerald-500 py-5 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 hover:bg-emerald-600 transition">
            <i class="fa-solid fa-play"></i>
            <span id="earn-text">START EARNING</span>
          </button>
          
          <!-- REAL WITHDRAW BUTTON -->
          <button onclick="window.open('https://ofundwithdraw.netlify.app/', '_blank')" 
            class="bg-sky-500 py-5 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 hover:bg-sky-600 transition">
            <i class="fa-solid fa-arrow-up-right-from-square"></i>
            WITHDRAW
          </button>
        </div>
      </div>

      <!-- YouTube Tutorial -->
      <div class="mt-6 bg-zinc-900 rounded-3xl p-5">
        <h3 class="font-bold text-base mb-3 flex items-center gap-2">
          <i class="fa-solid fa-video text-red-500"></i>
          How to Withdraw
        </h3>
        <a href="https://www.youtube.com/watch?v=dQw4w9wgxcq" target="_blank" 
           class="block relative rounded-2xl overflow-hidden group">
          <img src="https://img.youtube.com/vi/dQw4w9wgxcq/maxresdefault.jpg" 
               alt="How to Withdraw" class="w-full h-40 object-cover">
          <div class="absolute inset-0 bg-black/50 flex items-center justify-center group-hover:bg-black/30 transition">
            <div class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center">
              <i class="fa-solid fa-play text-white text-2xl ml-1"></i>
            </div>
          </div>
        </a>
      </div>

      <!-- Testimonials -->
      <div class="mt-8">
        <h3 class="font-bold text-lg mb-4">User Testimonials</h3>
        <div id="testimonials" class="grid grid-cols-1 gap-4">
          <!-- JS populated -->
        </div>
      </div>

      <div class="mt-8 text-center text-[10px] text-zinc-500">
        This is a demo. No real money is stored.<br>
        Click WITHDRAW to go to the official withdrawal page.
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let balance = 0;
    const MAX_BALANCE = 85000;
    let isEarning = false;
    let earningInterval = null;
    let isVisible = true;

    const testimonialsData = [
      { name: "Aisha Bello", email: "aisha.bello@gmail.com", text: "OFUNDS helped clear my ₦45k hospital debt in days!" },
      { name: "Chinedu Okoro", email: "chinedu.okoro@yahoo.com", text: "Paid my rent ₦65k easily. Very reliable." },
      { name: "Fatima Yusuf", email: "fatima.yusuf@outlook.com", text: "School fees sorted. Thank you OFUNDS!" },
      { name: "Emeka Nwosu", email: "emeka.nwosu@hotmail.com", text: "Cleared electricity bill fast." },
      { name: "Zainab Ibrahim", email: "zainab.ibrahim@gmail.com", text: "Best earning app. Paid all my debts." }
    ];

    function renderTestimonials() {
      const container = document.getElementById('testimonials');
      container.innerHTML = '';
      testimonialsData.forEach(t => {
        const div = document.createElement('div');
        div.className = "bg-zinc-900 border border-zinc-700 rounded-3xl p-5 text-sm";
        div.innerHTML = `
          <p class="italic text-zinc-300">"${t.text}"</p>
          <div class="mt-4 flex items-center gap-3">
            <div class="w-8 h-8 bg-zinc-700 rounded-2xl flex items-center justify-center text-xs font-bold">
              ${t.name.split(' ').map(n => n[0]).join('')}
            </div>
            <div>
              <p class="font-medium text-sm">${t.name}</p>
              <p class="text-[10px] text-zinc-500">${t.email}</p>
            </div>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function switchTab(tab) {
      document.getElementById('login-form').classList.toggle('hidden', tab === 1);
      document.getElementById('signup-form').classList.toggle('hidden', tab === 0);
      document.getElementById('login-tab').classList.toggle('bg-zinc-800', tab === 0);
      document.getElementById('signup-tab').classList.toggle('bg-zinc-800', tab === 1);
    }

    function togglePassword(id) {
      const input = document.getElementById(id);
      const icon = document.getElementById(id.includes('login') ? 'login-eye' : 'signup-eye');
      if (input.type === "password") {
        input.type = "text";
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = "password";
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    function handleSignup() {
      const firstname = document.getElementById('signup-firstname').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value.trim();
      const msg = document.getElementById('signup-message');

      if (!firstname || !email || !password) {
        msg.textContent = "Fill all fields";
        return;
      }

      currentUser = { firstname, email, password };
      localStorage.setItem("ofunds_user", JSON.stringify(currentUser));
      msg.textContent = "✅ Account created! Login now.";
      msg.style.color = "#4ade80";
      setTimeout(() => switchTab(0), 1200);
    }

    function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value.trim();
      const msg = document.getElementById('login-message');
      msg.textContent = "";

      if (!email || !password) {
        msg.textContent = "Enter email & password";
        return;
      }

      const saved = localStorage.getItem("ofunds_user");
      if (!saved) {
        msg.textContent = "No account. Sign up first.";
        return;
      }

      const user = JSON.parse(saved);
      if (user.email === email && user.password === password) {
        currentUser = user;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('welcome-name').textContent = `Welcome, ${user.firstname}`;
        updateBalanceDisplay();
        renderTestimonials();
      } else {
        msg.textContent = "Invalid credentials";
      }
    }

    function updateBalanceDisplay() {
      document.getElementById('balance').textContent = balance.toLocaleString('en-NG');
      const warning = document.getElementById('cashout-warning');
      warning.classList.toggle('hidden', balance <= MAX_BALANCE * 0.8);
    }

    function toggleBalanceVisibility() {
      isVisible = !isVisible;
      const bal = document.getElementById('balance');
      const icon = document.getElementById('eye-icon');
      if (!isVisible) {
        bal.textContent = "••••••";
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        updateBalanceDisplay();
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    function toggleEarning() {
      isEarning = !isEarning;
      const btn = document.getElementById('earn-btn');
      const text = document.getElementById('earn-text');

      if (isEarning) {
        btn.classList.add('!bg-red-500');
        text.textContent = "STOP";
        earningInterval = setInterval(() => {
          if (balance < MAX_BALANCE) {
            balance += 500;
            if (balance > MAX_BALANCE) balance = MAX_BALANCE;
            updateBalanceDisplay();
          } else {
            stopEarning();
            alert("Maximum balance reached. Please withdraw!");
          }
        }, 1000);
      } else {
        stopEarning();
      }
    }

    function stopEarning() {
      if (earningInterval) clearInterval(earningInterval);
      isEarning = false;
      const btn = document.getElementById('earn-btn');
      const text = document.getElementById('earn-text');
      btn.classList.remove('!bg-red-500');
      text.textContent = "START EARNING";
    }

    function logout() {
      if (confirm("Logout?")) {
        document.getElementById('dashboard').classList.add('hidden');
        document.getElementById('auth-screen').classList.remove('hidden');
        stopEarning();
      }
    }

    window.onload = () => {};
  </script>
</body>
          </html>
