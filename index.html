<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OFUNDS - Earn Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); }
    .balance-text { font-size: 2.8rem; font-weight: 900; letter-spacing: -1px; } /* Reduced size */
    .neon-glow { text-shadow: 0 0 20px rgb(234 179 8); }
    .testimonial-card {
      transition: all 0.3s ease;
    }
    .testimonial-card:hover {
      transform: scale(1.02);
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen gradient-bg">

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
      <div class="flex justify-center mb-10">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-yellow-400 rounded-2xl flex items-center justify-center">
            <i class="fa-solid fa-coins text-zinc-900 text-3xl"></i>
          </div>
          <div>
            <h1 class="text-4xl font-black tracking-tighter">OFUNDS</h1>
            <p class="text-yellow-400 text-sm -mt-1">EARN LIVE</p>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="bg-zinc-900 rounded-3xl p-1 flex mb-8">
        <button onclick="switchTab(0)" id="login-tab"
          class="flex-1 py-4 rounded-3xl font-semibold bg-zinc-800 text-white">Login</button>
        <button onclick="switchTab(1)" id="signup-tab"
          class="flex-1 py-4 rounded-3xl font-semibold">Sign Up</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="login-form">
        <div class="space-y-5">
          <input type="email" id="login-email" placeholder="Email address" 
            class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-5 focus:outline-none focus:border-yellow-400 text-white">
          
          <div class="relative">
            <input type="password" id="login-password" placeholder="Password" 
              class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-5 focus:outline-none focus:border-yellow-400 text-white">
            <button onclick="togglePassword('login-password')" class="absolute right-6 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-white">
              <i class="fa-solid fa-eye" id="login-eye"></i>
            </button>
          </div>

          <button onclick="handleLogin()" 
            class="w-full bg-yellow-400 hover:bg-yellow-300 text-zinc-900 font-bold py-5 rounded-2xl text-lg active:scale-95 transition">
            LOGIN
          </button>
          <p id="login-message" class="text-center text-red-400 text-sm min-h-[20px]"></p>
        </div>
      </div>

      <!-- SIGNUP FORM -->
      <div id="signup-form" class="hidden">
        <div class="space-y-5">
          <input type="text" id="signup-firstname" placeholder="First name" 
            class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-5 focus:outline-none focus:border-yellow-400">
          
          <input type="email" id="signup-email" placeholder="Email address" 
            class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-5 focus:outline-none focus:border-yellow-400">
          
          <div class="relative">
            <input type="password" id="signup-password" placeholder="Create password" 
              class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-5 focus:outline-none focus:border-yellow-400">
            <button onclick="togglePassword('signup-password')" class="absolute right-6 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-white">
              <i class="fa-solid fa-eye" id="signup-eye"></i>
            </button>
          </div>

          <button onclick="handleSignup()" 
            class="w-full bg-yellow-400 hover:bg-yellow-300 text-zinc-900 font-bold py-5 rounded-2xl text-lg active:scale-95 transition">
            CREATE ACCOUNT
          </button>
          <p id="signup-message" class="text-center text-red-400 text-sm min-h-[20px]"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden min-h-screen pb-12">
    <nav class="bg-zinc-900 px-6 py-5 flex justify-between items-center border-b border-zinc-800">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-yellow-400 rounded-2xl flex items-center justify-center">
          <i class="fa-solid fa-coins text-zinc-900"></i>
        </div>
        <h1 class="font-black text-2xl tracking-tighter">OFUNDS</h1>
      </div>
      <button onclick="logout()" class="text-zinc-400 hover:text-red-400">
        <i class="fa-solid fa-right-from-bracket"></i>
      </button>
    </nav>

    <div class="p-6 max-w-5xl mx-auto">
      <h2 id="welcome-name" class="text-3xl font-bold">Welcome back</h2>
      <p class="text-zinc-400">Earn ₦500 every second • Max ₦85,000</p>

      <!-- Balance Card -->
      <div class="mt-8 bg-gradient-to-br from-zinc-900 to-zinc-800 border border-yellow-400/30 rounded-3xl p-8">
        <div class="flex justify-between items-start">
          <div>
            <p class="uppercase text-xs tracking-widest text-zinc-400">TOTAL BALANCE</p>
            <div class="flex items-baseline mt-3">
              <span class="text-4xl font-black text-yellow-400">₦</span>
              <span id="balance" class="balance-text neon-glow ml-1">0</span>
            </div>
            <p id="balance-limit" class="text-emerald-400 text-sm mt-1">₦85,000 limit</p>
          </div>
          <button onclick="toggleBalanceVisibility()" class="mt-2">
            <i class="fa-solid fa-eye text-2xl text-zinc-400" id="eye-icon"></i>
          </button>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-10">
          <button onclick="toggleEarning()" id="earn-btn"
            class="bg-emerald-500 py-6 rounded-2xl font-bold text-lg flex items-center justify-center gap-3 hover:bg-emerald-600 transition">
            <i class="fa-solid fa-play"></i>
            <span id="earn-text">START EARNING</span>
          </button>
          
          <button onclick="showWithdrawModal()" 
            class="bg-sky-500 py-6 rounded-2xl font-bold text-lg flex items-center justify-center gap-3 hover:bg-sky-600 transition">
            <i class="fa-solid fa-arrow-up-right-from-square"></i>
            WITHDRAW
          </button>
        </div>
      </div>

      <!-- How to Withdraw - YouTube -->
      <div class="mt-8 bg-zinc-900 rounded-3xl p-6">
        <h3 class="font-bold text-lg mb-4 flex items-center gap-2">
          <i class="fa-solid fa-video text-red-500"></i>
          How to Withdraw
        </h3>
        <a href="https://www.youtube.com/watch?v=dQw4w9wgxcq" target="_blank" 
           class="block relative rounded-2xl overflow-hidden group">
          <img src="https://img.youtube.com/vi/dQw4w9wgxcq/maxresdefault.jpg" 
               alt="How to Withdraw from OFUNDS" 
               class="w-full h-52 object-cover">
          <div class="absolute inset-0 bg-black/40 flex items-center justify-center group-hover:bg-black/30 transition">
            <div class="w-16 h-16 bg-red-600 rounded-full flex items-center justify-center">
              <i class="fa-solid fa-play text-white text-3xl ml-1"></i>
            </div>
          </div>
          <div class="absolute bottom-3 left-3 bg-black/70 text-xs px-3 py-1 rounded-full">
            Watch Tutorial (1:45)
          </div>
        </a>
        <p class="text-center text-zinc-400 text-sm mt-3">Click image to watch full guide on YouTube</p>
      </div>

      <!-- Testimonials -->
      <div class="mt-10">
        <h3 class="font-bold text-xl mb-6 flex items-center gap-2">
          <i class="fa-solid fa-quote-left"></i>
          What Users Are Saying
        </h3>
        <div id="testimonials" class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- WITHDRAWAL MODAL -->
  <div id="withdraw-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-md mx-4">
      <h3 class="text-2xl font-bold mb-6">Withdraw Funds</h3>
      <div class="space-y-6">
        <div>
          <p class="text-zinc-400 text-sm mb-2">Available Balance</p>
          <p id="modal-balance" class="text-4xl font-bold text-yellow-400">₦0</p>
        </div>
        <div>
          <label class="text-zinc-400 text-sm block mb-2">Withdrawal Amount (₦)</label>
          <input type="number" id="withdraw-amount" 
            class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 focus:outline-none focus:border-yellow-400 text-2xl"
            placeholder="Enter amount" min="1000" step="1000">
        </div>
        <div class="text-xs text-zinc-400">
          • Minimum: ₦1,000<br>
          • Maximum: ₦85,000
        </div>
        <div class="flex gap-4">
          <button onclick="hideWithdrawModal()" 
            class="flex-1 py-5 border border-zinc-600 rounded-2xl font-semibold">CANCEL</button>
          <button onclick="processWithdrawal()" 
            class="flex-1 py-5 bg-yellow-400 text-zinc-900 rounded-2xl font-bold">CONFIRM</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let balance = 0;
    const MAX_BALANCE = 85000;
    let isEarning = false;
    let earningInterval = null;
    let isVisible = true;

    const testimonialsData = [
      { name: "Aisha Bello", email: "aisha.bello@gmail.com", text: "OFUNDS paid my ₦45,000 hospital debt in just 3 days. Life saver!" },
      { name: "Chinedu Okoro", email: "chinedu.okoro@yahoo.com", text: "Cleared my rent debt of ₦65k. This app is legit!" },
      { name: "Fatima Yusuf", email: "fatima.yusuf@outlook.com", text: "Earned enough to pay school fees. Thank you OFUNDS!" },
      { name: "Emeka Nwosu", email: "emeka.nwosu@hotmail.com", text: "Paid my ₦28,000 electricity bill. Super easy withdrawals." },
      { name: "Zainab Ibrahim", email: "zainab.ibrahim@gmail.com", text: "Cleared family debt within a week. Highly recommended!" },
      { name: "Tunde Adebayo", email: "tunde.adebayo@proton.me", text: "Best earning app ever. Paid my car repair ₦52k." },
      { name: "Ngozi Eze", email: "ngozi.eze@gmail.com", text: "Helped me settle my ₦38,000 shop debt. God bless OFUNDS." },
      { name: "Ibrahim Musa", email: "ibrahim.musa@live.com", text: "Withdrew ₦70k and cleared all debts. Real and fast." },
      { name: "Chioma Okeke", email: "chioma.okeke@gmail.com", text: "Paid my mother's medical bill. This changed my life." },
      { name: "Suleiman Abubakar", email: "sule.abubakar@yahoo.com", text: "Earned and withdrew seamlessly. No stress at all." }
    ];

    function renderTestimonials() {
      const container = document.getElementById('testimonials');
      container.innerHTML = '';
      
      testimonialsData.forEach(t => {
        const div = document.createElement('div');
        div.className = "testimonial-card bg-zinc-900 border border-zinc-700 rounded-3xl p-6";
        div.innerHTML = `
          <div class="flex gap-1 text-yellow-400 mb-3">
            ★★★★☆
          </div>
          <p class="italic text-zinc-300">"${t.text}"</p>
          <div class="mt-6 flex items-center gap-3">
            <div class="w-10 h-10 bg-zinc-700 rounded-2xl flex items-center justify-center text-sm font-bold">
              ${t.name.split(' ').map(n => n[0]).join('')}
            </div>
            <div>
              <p class="font-medium">${t.name}</p>
              <p class="text-xs text-zinc-500">${t.email}</p>
            </div>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function switchTab(tab) {
      document.getElementById('login-form').classList.toggle('hidden', tab === 1);
      document.getElementById('signup-form').classList.toggle('hidden', tab === 0);
      document.getElementById('login-tab').classList.toggle('bg-zinc-800', tab === 0);
      document.getElementById('signup-tab').classList.toggle('bg-zinc-800', tab === 1);
    }

    function togglePassword(id) {
      const input = document.getElementById(id);
      const iconId = id.includes('login') ? 'login-eye' : 'signup-eye';
      const icon = document.getElementById(iconId);
      if (input.type === "password") {
        input.type = "text";
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = "password";
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    function handleSignup() {
      const firstname = document.getElementById('signup-firstname').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value.trim();
      const msg = document.getElementById('signup-message');

      if (!firstname || !email || !password) {
        msg.textContent = "Please fill all fields";
        return;
      }

      currentUser = { firstname, email, password };
      localStorage.setItem("ofunds_user", JSON.stringify(currentUser));
      msg.textContent = "✅ Account created! Now login.";
      msg.style.color = "#4ade80";
      setTimeout(() => switchTab(0), 1500);
    }

    function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value.trim();
      const msg = document.getElementById('login-message');

      msg.textContent = "";

      if (!email || !password) {
        msg.textContent = "Enter email and password";
        return;
      }

      const savedData = localStorage.getItem("ofunds_user");
      if (!savedData) {
        msg.textContent = "No account found. Please sign up first.";
        return;
      }

      try {
        const user = JSON.parse(savedData);
        if (user.email === email && user.password === password) {
          currentUser = user;
          document.getElementById('auth-screen').classList.add('hidden');
          document.getElementById('dashboard').classList.remove('hidden');
          document.getElementById('welcome-name').textContent = `Welcome back, ${user.firstname}!`;
          updateBalanceDisplay();
          renderTestimonials();
        } else {
          msg.textContent = "❌ Wrong email or password";
        }
      } catch(e) {
        msg.textContent = "Error loading account.";
      }
    }

    function updateBalanceDisplay() {
      document.getElementById('balance').textContent = balance.toLocaleString('en-NG');
    }

    function toggleBalanceVisibility() {
      isVisible = !isVisible;
      const bal = document.getElementById('balance');
      const icon = document.getElementById('eye-icon');
      if (!isVisible) {
        bal.textContent = "••••••";
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        updateBalanceDisplay();
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    function toggleEarning() {
      isEarning = !isEarning;
      const btn = document.getElementById('earn-btn');
      const text = document.getElementById('earn-text');

      if (isEarning) {
        btn.classList.add('!bg-red-500', '!hover:bg-red-600');
        text.textContent = "STOP EARNING";
        earningInterval = setInterval(() => {
          if (balance < MAX_BALANCE) {
            balance += 500;
            if (balance > MAX_BALANCE) balance = MAX_BALANCE;
            updateBalanceDisplay();
          } else {
            stopEarning();
            alert("🎉 Maximum balance of ₦85,000 reached!");
          }
        }, 1000);
      } else {
        stopEarning();
      }
    }

    function stopEarning() {
      if (earningInterval) clearInterval(earningInterval);
      isEarning = false;
      const btn = document.getElementById('earn-btn');
      const text = document.getElementById('earn-text');
      btn.classList.remove('!bg-red-500', '!hover:bg-red-600');
      text.textContent = "START EARNING";
    }

    function showWithdrawModal() {
      document.getElementById('modal-balance').textContent = `₦${balance.toLocaleString('en-NG')}`;
      document.getElementById('withdraw-modal').classList.remove('hidden');
      document.getElementById('withdraw-amount').value = "";
    }

    function hideWithdrawModal() {
      document.getElementById('withdraw-modal').classList.add('hidden');
    }

    function processWithdrawal() {
      const amountInput = document.getElementById('withdraw-amount');
      let amount = parseFloat(amountInput.value);

      if (!amount || amount < 1000) {
        alert("Minimum withdrawal is ₦1,000");
        return;
      }
      if (amount > balance) {
        alert("Insufficient balance!");
        return;
      }

      balance -= amount;
      updateBalanceDisplay();
      hideWithdrawModal();
      alert(`✅ ₦${amount.toLocaleString()} withdrawn successfully!\n\nCheck your bank in 24hrs.`);
    }

    function logout() {
      if (confirm("Logout from OFUNDS?")) {
        document.getElementById('dashboard').classList.add('hidden');
        document.getElementById('auth-screen').classList.remove('hidden');
        stopEarning();
      }
    }

    window.onload = () => {};
  </script>
</body>
            </html>
